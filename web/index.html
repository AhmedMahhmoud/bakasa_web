<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bakasa card game — order the collector box.">
  <meta name="theme-color" content="#070A12">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bakasa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bakasa — Card Game</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bakasa-bg: #070a12;
      --bakasa-cyan: #22d3ee;
      --bakasa-magenta: #e879f9;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bakasa-bg);
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(34, 211, 238, 0.12), transparent 55%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(232, 121, 249, 0.08), transparent 45%),
                  var(--bakasa-bg);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #flutter-loading.flutter-loading--hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .flutter-loading__stage {
      position: relative;
      width: min(220px, 70vw);
      height: min(220px, 70vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flutter-loading__ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--bakasa-cyan);
      border-right-color: rgba(34, 211, 238, 0.25);
      animation: bakasa-ring-spin 1.1s linear infinite;
      filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.35));
    }

    .flutter-loading__ring--inner {
      inset: 14px;
      border-top-color: var(--bakasa-magenta);
      border-right-color: rgba(232, 121, 249, 0.2);
      animation-direction: reverse;
      animation-duration: 1.6s;
      opacity: 0.85;
    }

    @keyframes bakasa-ring-spin {
      to { transform: rotate(360deg); }
    }

    .flutter-loading__logo-wrap {
      position: relative;
      width: 58%;
      height: 58%;
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .flutter-loading__logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      animation: bakasa-logo-flip 2.6s linear infinite;
      filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.25));
    }

    /* Horizontal-style spin (rotate around Y) */
    @keyframes bakasa-logo-flip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .flutter-loading__hint {
      margin: 28px 24px 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.95);
      animation: bakasa-hint-pulse 1.8s ease-in-out infinite;
    }

    @keyframes bakasa-hint-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="flutter-loading" aria-busy="true" aria-live="polite">
    <div class="flutter-loading__stage">
      <div class="flutter-loading__ring" aria-hidden="true"></div>
      <div class="flutter-loading__ring flutter-loading__ring--inner" aria-hidden="true"></div>
      <div class="flutter-loading__logo-wrap">
        <!-- Flutter web places pubspec assets under assets/ → path is assets/assets/... -->
        <img src="assets/assets/images/game_logo.png" alt="" width="160" height="160" decoding="async" />
      </div>
    </div>
    <p class="flutter-loading__hint">Loading</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
